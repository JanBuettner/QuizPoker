<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Chip body gradient -->
    <radialGradient id="chipBody" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3d2a14"/>
      <stop offset="70%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#1a1209"/>
    </radialGradient>
    <!-- Gold edge gradient -->
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a24e"/>
      <stop offset="50%" stop-color="#e0be6a"/>
      <stop offset="100%" stop-color="#8b6d24"/>
    </linearGradient>
    <!-- Inner ring gradient -->
    <linearGradient id="innerRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a24e"/>
      <stop offset="100%" stop-color="#8b6d24"/>
    </linearGradient>
    <!-- Question mark gradient -->
    <linearGradient id="qGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#c8a24e"/>
    </linearGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="248" fill="url(#goldEdge)"/>

  <!-- Chip edge notches (32 notches around the perimeter) -->
  <g>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(0,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(11.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(22.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(33.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(45,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(56.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(67.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(78.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(90,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(101.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(112.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(123.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(135,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(146.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(157.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(168.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(180,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(191.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(202.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(213.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(225,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(236.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(247.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(258.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(270,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(281.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(292.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(303.75,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(315,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(326.25,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(337.5,256,256)"/>
    <rect x="247" y="2" width="18" height="32" rx="4" fill="#1a1209" transform="rotate(348.75,256,256)"/>
  </g>

  <!-- Dark chip body -->
  <circle cx="256" cy="256" r="216" fill="url(#chipBody)"/>

  <!-- Inner decorative gold ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#innerRing)" stroke-width="3" opacity="0.7"/>

  <!-- Second inner ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#8b6d24" stroke-width="1.5" opacity="0.4"/>

  <!-- Dashed decorative ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#c8a24e" stroke-width="1" stroke-dasharray="8 12" opacity="0.35"/>

  <!-- Question mark - bold, centered -->
  <text x="256" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="240" font-weight="bold" fill="url(#qGrad)" opacity="0.95">?</text>

  <!-- Subtle QP text at bottom -->
  <text x="256" y="400" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#8b6d24" letter-spacing="8" opacity="0.5">QP</text>
</svg>
